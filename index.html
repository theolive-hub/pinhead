<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetch by Pinhead Systems — The Future of the Pin Deck</title>
  <style>
    :root {
      --red: #ff1f1f;
      --blue: #0070f3;
      --white: #ffffff;
      --dim: #94a3b8;
      --bg: #050505;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated Grid Background */
    .grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      transform: perspective(500px) rotateX(60deg) translateY(-100px);
      animation: moveGrid 20s linear infinite;
      z-index: 1;
    }

    @keyframes moveGrid {
      from { background-position: 0 0; }
      to { background-position: 0 500px; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.2;
      z-index: 0;
    }
    .orb-red { width: 400px; height: 400px; background: var(--red); top: -10%; left: -5%; }
    .orb-blue { width: 500px; height: 500px; background: var(--blue); bottom: -10%; right: -5%; }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      max-width: 700px;
      width: 100%;
    }

    /* Logo with Scanning Effect */
    .logo-container {
      position: relative;
      display: inline-block;
      margin-bottom: 2.5rem;
    }

    .logo-container img {
      width: clamp(260px, 50vw, 360px);
      height: auto;
      border-radius: 20px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(255, 31, 31, 0.3));
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--red);
      box-shadow: 0 0 15px var(--red), 0 0 30px var(--red);
      animation: scan 3s ease-in-out infinite;
      opacity: 0.7;
    }

    @keyframes scan {
      0%, 100% { top: 5%; opacity: 0; }
      50% { top: 95%; opacity: 1; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.05);
