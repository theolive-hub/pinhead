<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetch by Pinhead Systems — Autonomous Pin-Setting</title>
  <meta name="description" content="Autonomous robotic pin-setting for commercial bowling. Fetch is coming." />
  <meta property="og:title" content="Fetch by Pinhead Systems" />
  <meta property="og:description" content="Zero downtime. Zero compromise. The future of the pin deck is robotic." />
  <style>
    :root {
      --red: #e02020;
      --blue: #1a6bcc;
      --white: #f8faff;
      --dim: #a0aabf;
      --bg: #0a0a0c;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .orb-red { width: 400px; height: 400px; background: var(--red); top: -10%; left: -5%; }
    .orb-blue { width: 500px; height: 500px; background: var(--blue); bottom: -10%; right: -5%; }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
    }

    .logo-wrap img {
      width: clamp(240px, 50vw, 320px); /* Increased size */
      height: auto;
      margin-bottom: 2rem;
      border-radius: 24px; /* Softens the square edges of the jpg */
      filter: drop-shadow(0 0 30px rgba(224, 32, 32, 0.2));
    }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    .badge span {
      width: 6px;
      height: 6px;
      background: var(--red);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 8px var(--red);
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 3.8rem); /* Slightly larger weight */
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      letter-spacing: -0.03em;
    }

    .pitch {
      font-size: 1.1rem;
      color: var(--dim);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .contact {
      font-size: 0.9rem;
      color: var(--dim);
      letter-spacing: 0.02em;
    }

    .contact a {
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .contact a:hover {
      color: var(--red);
      border-color: var(--red);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="orb orb-red"></div>
  <div class="orb orb-blue"></div>

  <main class="container">
    <div class="logo-wrap">
      <img src="logo.jpg" alt="Fetch Logo">
    </div>

    <div class="badge"><span></span> Coming Soon</div>

    <h1>The Future of the Pin Deck.</h1>

    <p class="pitch">
      <strong>Autonomous robotic bowling pin-setting system.</strong><br> 
      Zero downtime. Zero compromise.
    </p>

    <div class="contact">
      Get in touch &nbsp;&mdash;&nbsp; 
      <a href="mailto:info@pinhead.systems">info@pinhead.systems</a>
    </div>
  </main>

  <footer>
    &copy; 2026 Pinhead Systems &nbsp;&middot;&nbsp; Patent Pending
  </footer>

</body>
</html>
