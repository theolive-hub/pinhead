<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetch by Pinhead Systems</title>
<style>
:root {
--amber: #ffbf00;
--white: #ffffff;
--dim: #94a3b8;
--bg: #000000;
}

html, body, main, div, h1, p, img, a, span, footer {
box-sizing: border-box;
margin: 0;
padding: 0;
}

html, body {
height: 100%;
background-color: var(--bg);
}

body {
color: var(--white);
font-family: sans-serif;
display: flex;
align-items: center;
justify-content: center;
}

.container {
text-align: center;
padding: 20px;
max-width: 600px;
width: 100%;
}

.logo-container {
margin-bottom: 0;
line-height: 0;
}

.logo-container img {
display: block;
margin: 0 auto;
width: clamp(280px, 80vw, 500px);
height: auto;
border-radius: 20px;
}

/* Badge: White text, amber dot, amber glow */
.badge {
display: inline-flex;
align-items: center;
font-size: 11px;
font-weight: 800;
letter-spacing: 2px;
text-transform: uppercase;
border: 1px solid rgba(255, 191, 0, 0.3);
padding: 8px 16px;
border-radius: 4px;
margin-top: 15px;
margin-bottom: 25px;
color: var(--white); /* White text */
}

.badge span {
width: 8px;
height: 8px;
background: var(--amber); /* Amber dot */
border-radius: 2px;
margin-right: 10px;
box-shadow: 0 0 8px var(--amber); /* Amber glow */
}

h1 {
font-size: clamp(2rem, 10vw, 3.5rem);
font-weight: 900;
line-height: 1.1;
margin-bottom: 20px;
text-transform: uppercase;
}

.pitch {
font-size: 1.1rem;
color: var(--dim);
line-height: 1.5;
margin-bottom: 40px;
}

.contact a {
color: var(--white);
text-decoration: none;
font-weight: 700;
border: 2px solid var(--white);
padding: 15px 30px;
border-radius: 4px;
display: inline-block;
}

footer {
margin-top: 60px;
font-size: 10px;
color: rgba(255, 255, 255, 0.3);
text-transform: uppercase;
}
</style>
</head>
<body>

<main class="container">
<div class="logo-container">
<img src="logo.png" alt="Fetch Logo">
</div>

<div class="badge"><span></span> System coming online</div>

<h1>The Future of the Pin Deck</h1>

<p class="pitch">
<strong>Autonomous robotic bowling pin-setting system.</strong><br>
Zero downtime. Zero compromise.
</p>

<div class="contact">
<a href="mailto:info@pinhead.systems">Inquire: info@pinhead.systems</a>
</div>

<footer>
&copy; 2026 Pinhead Systems // Patent Pending
</footer>
</main>

</body>
</html>
