<style>
:root {
--amber: #ffbf00;
--white: #ffffff;
--dim: #94a3b8;
--bg: #000000;
}

html, body, main, div, h1, h2, p, img, a, span, footer {
box-sizing: border-box;
margin: 0;
padding: 0;
}

html, body {
height: 100%;
background-color: var(--bg);
}

body {
color: var(--white);
font-family: 'Inter', sans-serif;
display: flex;
align-items: center;
justify-content: center;
}

.container {
text-align: center;
padding: 20px;
max-width: 700px;
width: 100%;
}

.logo-container {
margin-bottom: 0;
line-height: 0;
}

.logo-container img {
display: block;
margin: 0 auto;
width: clamp(280px, 80vw, 500px);
height: auto;
border-radius: 20px;
}

.badge {
display: inline-flex;
align-items: center;
font-size: 11px;
font-weight: 800;
letter-spacing: 2px;
text-transform: uppercase;
border: 1px solid rgba(255, 191, 0, 0.3);
padding: 8px 16px;
border-radius: 4px;
margin-top: 15px;
margin-bottom: 25px;
color: var(--white);
}

.badge span {
width: 8px;
height: 8px;
background: var(--amber);
border-radius: 2px;
margin-right: 10px;
animation: pulse-amber 2s infinite ease-in-out;
}

@keyframes pulse-amber {
0% { opacity: 0.4; box-shadow: 0 0 0px var(--amber); }
50% { opacity: 1; box-shadow: 0 0 10px var(--amber); }
100% { opacity: 0.4; box-shadow: 0 0 0px var(--amber); }
}

h1 {
font-size: clamp(2rem, 10vw, 3.5rem);
font-weight: 900;
line-height: 1.1;
margin-bottom: 20px;
text-transform: uppercase;
}

.pitch {
font-size: 1.2rem;
color: var(--dim);
line-height: 1.6;
margin-bottom: 40px;
}

.pitch strong {
color: var(--white);
display: block;
margin-bottom: 5px;
}

.contact a {
color: var(--white);
text-decoration: none;
font-weight: 700;
border: 2px solid var(--white);
padding: 15px 30px;
border-radius: 4px;
display: inline-block;
transition: background 0.3s;
}

.contact a:hover {
background: var(--white);
color: var(--bg);
}

footer {
margin-top: 60px;
font-size: 10px;
color: rgba(255, 255, 255, 0.3);
text-transform: uppercase;
letter-spacing: 2px;
}

Zero downtime. Zero compromise.
