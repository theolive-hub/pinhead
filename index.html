html, body, main, div, h1, p, img, a, span, footer {

html, body {

}

.container {

.logo-container {

}

.logo-container img {
display: block;
margin: 0 auto;
width: clamp(280px, 80vw, 500px);
height: auto;
border-radius: 20px;
}

.badge {
display: inline-flex;
align-items: center;
font-size: 11px;

border-radius: 2px;
margin-right: 10px;
animation: pulse-amber 2s infinite ease-in-out;
}

@keyframes pulse-amber {
0% { opacity: 0.4; box-shadow: 0 0 0px var(--amber); }
50% { opacity: 1; box-shadow: 0 0 10px var(--amber); }
100% { opacity: 0.4; box-shadow: 0 0 0px var(--amber); }
}

font-size: clamp(2.2rem, 9vw, 3.8rem);
font-weight: 900;
line-height: 1;
margin-bottom: 20px;
letter-spacing: -0.04em;
text-transform: uppercase;
}

.pitch {
font-size: 1.2rem;
color: var(--dim);
line-height: 1.6;
margin-bottom: 40px;
}

.pitch strong {
color: var(--white);
display: block;
margin-bottom: 8px;
}

.tagline-sub {
font-style: italic;
opacity: 0.8;

margin-top: 8px;
}

.contact a {

}

footer {
