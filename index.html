<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetch by Pinhead Systems — The Future of the Pin Deck</title>
  <style>
    :root {
      --red: #ff1f1f;
      --blue: #0070f3;
      --white: #ffffff;
      --dim: #94a3b8;
      --bg: #000000;
    }

    /* Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 700px;
      width: 100%;
    }

    /* Logo Section */
    .logo-container {
      margin-bottom: 2.5rem;
    }

    .logo-container img {
      width: clamp(360px, 70vw, 560px);
      height: auto;
      border-radius: 20px;
      border: 0px solid rgba(255, 255, 255, 0.1);
      display: inline-block;
    }

    /* Status Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 4px;
      margin-bottom: 2rem;
    }

    .badge span {
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 2px;
      margin-right: 10px;
    }

    /* Typography */
    h1 {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1.5rem;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .pitch {
      font-size: 1.15rem;
      color: var(--dim);
      margin-bottom: 3rem;
      line-height: 1.5;
    }

    .pitch strong {
      color: var(--white);
    }

    /* Contact Action */
    .contact a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      border: 2px solid #ffffff;
      padding: 14px 28px;
      border-radius: 4px;
      display: inline-block;
    }

    footer {
      margin-top: 4rem;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <main class="container">
    <div class="logo-container">
      <img src="logo.png" alt="Fetch Logo">
    </div>

    <div class="badge"><span></span> System Online</div>

    <h1>The Future of the <br>Pin Deck.</h1>

    <p class="pitch">
      <strong>Autonomous robotic bowling pin-setting system.</strong><br> 
      Zero downtime. Zero compromise.
    </p>

    <div class="contact">
      <a href="mailto:info@pinhead.systems">Inquire: info@pinhead.systems</a>
    </div>

    <footer>
      &copy; 2026 Pinhead Systems &nbsp;//&nbsp; Patent Pending
    </footer>
  </main>

</body>
</html>
