<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetch by Pinhead Systems — Coming Soon</title>
  <meta name="description" content="Autonomous robotic pin-setting for commercial bowling. Fetch is coming." />
  <meta property="og:title" content="Fetch by Pinhead Systems" />
  <meta property="og:description" content="Autonomous robotic pin-setting for commercial bowling. Zero downtime. Zero compromise." />
  <meta property="og:image" content="logo.png" />
  <link rel="icon" type="image/png" href="logo.png" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red:   #e02020;
      --blue:  #1a6bcc;
      --white: #f0f4ff;
      --dim:   #8a94a8;
      --bg:    #060608;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── ambient glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb-red {
      width: 600px; height: 600px;
      background: var(--red);
      top: -180px; left: -180px;
      animation-duration: 20s;
    }
    .orb-blue {
      width: 500px; height: 500px;
      background: var(--blue);
      bottom: -160px; right: -160px;
      animation-duration: 16s;
      animation-delay: -8s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── lane lines ── */
    .lanes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .lane-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.04) 40%, rgba(255,255,255,0.04) 60%, transparent 100%);
    }

    /* ── main card ── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 24px;
      max-width: 680px;
      width: 100%;
      animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── logo ── */
    .logo-wrap {
      margin-bottom: 36px;
    }
    .logo-wrap img {
      width: clamp(200px, 45vw, 320px);
      height: auto;
      filter: drop-shadow(0 0 40px rgba(224, 32, 32, 0.25)) drop-shadow(0 0 80px rgba(26, 107, 204, 0.15));
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* ── badge ── */
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 6px 16px;
      margin-bottom: 22px;
      backdrop-filter: blur(8px);
    }
    .badge span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── headline ── */
    h1 {
      font-size: clamp(1.7rem, 5vw, 2.7rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 18px;
      background: linear-gradient(135deg, var(--white) 30%, var(--dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── sub-pitch ── */
    .pitch {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: var(--dim);
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 40px;
    }
    .pitch strong {
      color: var(--white);
      font-weight: 600;
    }

    /* ── divider ── */
    .rule {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--blue));
      border-radius: 2px;
      margin: 0 auto 40px;
    }

    /* ── contact link ── */
    .contact {
      font-size: 0.82rem;
      color: var(--dim);
      letter-spacing: 0.04em;
    }
    .contact a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact a:hover {
      color: var(--red);
      border-color: var(--red);
    }

/* ── footer ── */
    footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.08em;
      z-index: 10;
    }

    /* ── responsive ── */
    @media (max-width: 480px) {
      .card { padding: 0 20px; }
      footer { font-size: 0.65rem; bottom: 16px; }
    }
  </style>
</head>
<body>

  <!-- ambient background -->
  <div class="orb orb-red"></div>
  <div class="orb orb-blue"></div>

  <!-- subtle lane lines -->
  <div class="lanes" aria-hidden="true">
    <div class="lane-line" style="left:15%"></div>
    <div class="lane-line" style="left:30%"></div>
    <div class="lane-line" style="left:50%"></div>
    <div class="lane-line" style="left:70%"></div>
    <div class="lane-line" style="left:85%"></div>
  </div>

  <!-- main content -->
  <main class="card" role="main">

    <div class="logo-wrap">
      <img src="logo.png" alt="Fetch by Pinhead Systems" width="320" height="320" />
    </div>

    <div class="badge"><span></span>Coming Soon</div>

    <h1>Bowling's Best Friend<br>is Almost Here.</h1>

    <div class="rule"></div>

    <p class="pitch">
      <strong>Autonomous robotic pin-setting</strong> for commercial bowling.<br>
      Zero downtime. Zero compromise.
    </p>

    <div class="contact">
      Get in touch &nbsp;&mdash;&nbsp;
      <a href="mailto:info@pinhead.systems">info@pinhead.systems</a>
    </div>


  </main>

  <footer>
    &copy; 2026 Pinhead Systems &nbsp;&middot;&nbsp; Patent Pending
  </footer>

</body>
</html>
