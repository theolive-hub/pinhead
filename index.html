<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetch by Pinhead Systems — The Future of the Pin Deck</title>
  <style>
    :root {
      --red: #ff1f1f;
      --blue: #0070f3;
      --white: #ffffff;
      --dim: #94a3b8;
      --bg: #000000;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 20px;
      max-width: 700px;
      width: 100%;
    }

    .logo-container {
      position: relative;
      display: inline-block;
      margin-bottom: 2.5rem;
    }

    .logo-container img {
      width: clamp(260px, 50vw, 360px);
      height: auto;
      border-radius: 20px;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Simplified Scan Line for compatibility */
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--red);
      box-shadow: 0 0 15px var(--red);
      animation: scan 3s ease-in-out infinite;
    }

    @keyframes scan {
      0%, 100% { top: 5%; }
      50% { top: 95%; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 4px;
      margin-bottom: 2rem;
    }

    .badge span {
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 2px;
      margin-right: 10px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 900;
      line-height: 0.95;
      margin-bottom: 1.5rem;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .pitch {
      font-size: 1.2rem;
      color: var(--dim);
      margin-bottom: 3rem;
      line-height: 1.4;
    }

    .contact a {
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      border: 1px solid #ffffff;
      padding: 12px 24px;
      border-radius: 4px;
      display: inline-block;
    }
